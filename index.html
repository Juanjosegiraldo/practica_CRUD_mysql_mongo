<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaludPlus - Patient Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏥 SaludPlus System</h1>

        <div class="card">
            <h2>Bulk Upload</h2>
            <form id="uploadForm">
                <input type="file" id="csvFile" accept=".csv" required>
                <button type="submit" class="btn-bulk">Upload CSV</button>
            </form>
            <p id="uploadStatus"></p>
        </div>

        <div class="card">
            <h2 id="formTitle">Patient Details</h2>
            <form id="patientForm">
                <input type="hidden" id="patientId">
                <input type="text" id="name" placeholder="Name" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="text" id="phone" placeholder="Phone">
                <input type="text" id="address" placeholder="Address">
                <button type="submit" id="saveBtn">Save Patient</button>
                <button type="button" id="cancelBtn" style="display:none;" onclick="resetForm()">Cancel</button>
            </form>
        </div>

        <div class="card">
            <h2>Patient Records</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="patientTableBody"></tbody>
            </table>
        </div>
    </div>
    <script type="module" src="/main.js"></script>
</body>
</html>
